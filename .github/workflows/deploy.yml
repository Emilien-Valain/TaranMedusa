name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.images.outputs.backend }}
      storefront_image: ${{ steps.images.outputs.storefront }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names (lowercase)
        id: images
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${REPO}/backend:latest" >> $GITHUB_OUTPUT
          echo "storefront=ghcr.io/${REPO}/storefront:latest" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.images.outputs.backend }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push storefront
        uses: docker/build-push-action@v5
        with:
          context: ./storefront
          push: true
          tags: ${{ steps.images.outputs.storefront }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_REGION=${{ secrets.NEXT_PUBLIC_DEFAULT_REGION }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (pour docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/taranmedusa/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/taranmedusa

            # Login to ghcr.io avec le PAT stocké sur le VPS
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Mise à jour des noms d'images dans .env
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ needs.build-and-push.outputs.backend_image }}|" .env
            sed -i "s|^STOREFRONT_IMAGE=.*|STOREFRONT_IMAGE=${{ needs.build-and-push.outputs.storefront_image }}|" .env

            # Pull et redémarrage
            docker compose pull
            docker compose up -d
            docker image prune -f
